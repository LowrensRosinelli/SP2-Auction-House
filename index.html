<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP2 Auction House | Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:opsz@9..40&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/SP2-Auction-House/dist/styles.css" />
  </head>
  <body class="app-shell">
    <header class="app-nav">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="/SP2-Auction-House/listings/" class="font-serif text-4xl leading-none tracking-tight">Auction House</a>
        <button id="mobileMenuBtn" class="listings-nav-link md:hidden" type="button" aria-expanded="false" aria-controls="mobileMenu">Menu</button>
        <nav class="hidden items-center gap-8 md:flex">
          <a class="listings-nav-link" href="/SP2-Auction-House/listings/">Browse</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/profile/">My Bids</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/create/">Sell</a>
          <span id="globalCredits" class="text-xs font-medium uppercase tracking-[0.12em] text-[color:var(--muted)] hidden">Credits: 0</span>
          <button id="logoutBtnDesktop" class="listings-nav-link hidden" type="button">Logout</button>
        </nav>
      </div>
      <div id="mobileMenu" class="hidden border-t border-[color:var(--border-soft)] bg-[color:var(--surface)] px-4 py-4 md:hidden">
        <div class="flex flex-col gap-3">
          <a class="listings-nav-link" href="/SP2-Auction-House/listings/">Browse</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/profile/">My Bids</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/create/">Sell</a>
          <span id="globalCreditsMobile" class="text-xs font-medium uppercase tracking-[0.12em] text-[color:var(--muted)] hidden">Credits: 0</span>
          <button id="logoutBtnMobile" class="listings-nav-link hidden text-left" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="container-main space-y-8">
      <section>
        <h1 class="page-heading">Welcome Back</h1>
        <p class="page-subtitle">Sign in or create a student account to place bids and publish lots.</p>
      </section>

      <div id="authMessage"></div>
      <section class="grid gap-6 md:grid-cols-2">
        <article class="section-card">
          <h2 class="mb-5 font-serif text-4xl leading-none">Login</h2>
          <form id="loginForm" class="space-y-4" novalidate>
            <div>
              <label class="label" for="loginEmail">Email</label>
              <input class="input" id="loginEmail" name="email" type="email" required autocomplete="email" />
            </div>
            <div>
              <label class="label" for="loginPassword">Password</label>
              <input class="input" id="loginPassword" name="password" type="password" required autocomplete="current-password" />
            </div>
            <button class="btn-primary mt-2 w-full" type="submit">Login</button>
          </form>
        </article>

        <article class="section-card">
          <h2 class="mb-5 font-serif text-4xl leading-none">Register</h2>
          <form id="registerForm" class="space-y-4" novalidate>
            <div>
              <label class="label" for="registerName">Name</label>
              <input class="input" id="registerName" name="name" type="text" required minlength="2" maxlength="20" />
            </div>
            <div>
              <label class="label" for="registerEmail">Email (@stud.noroff.no)</label>
              <input class="input" id="registerEmail" name="email" type="email" required autocomplete="email" />
            </div>
            <div>
              <label class="label" for="registerPassword">Password</label>
              <input class="input" id="registerPassword" name="password" type="password" required minlength="8" autocomplete="new-password" />
            </div>
            <button class="btn-primary mt-2 w-full" type="submit">Register</button>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="/SP2-Auction-House/js/pages/login.js"></script>
  </body>
</html>
