<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP2 Auction House | Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:opsz@9..40&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/SP2-Auction-House/dist/styles.css" />
  </head>
  <body class="app-shell">
    <header class="app-nav">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="/SP2-Auction-House/listings/" class="font-serif text-4xl leading-none tracking-tight">Auction House</a>
        <button id="mobileMenuBtn" class="listings-nav-link md:hidden" type="button" aria-expanded="false" aria-controls="mobileMenu">Menu</button>
        <nav class="hidden items-center gap-8 md:flex">
          <a class="listings-nav-link is-active" href="/SP2-Auction-House/listings/">Browse</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/profile/">My Bids</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/create/">Sell</a>
          <span id="globalCredits" class="text-xs font-medium uppercase tracking-[0.12em] text-[color:var(--muted)] hidden">Credits: 0</span>
          <button id="logoutBtnDesktop" class="listings-nav-link hidden" type="button">Logout</button>
        </nav>
      </div>
      <div id="mobileMenu" class="hidden border-t border-[color:var(--border-soft)] bg-[color:var(--surface)] px-4 py-4 md:hidden">
        <div class="flex flex-col gap-3">
          <a class="listings-nav-link is-active" href="/SP2-Auction-House/listings/">Browse</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/profile/">My Bids</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/create/">Sell</a>
          <span id="globalCreditsMobile" class="text-xs font-medium uppercase tracking-[0.12em] text-[color:var(--muted)] hidden">Credits: 0</span>
          <button id="logoutBtnMobile" class="listings-nav-link hidden text-left" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="container-main space-y-8">
      <section class="pt-2">
        <h1 class="page-title">Current Lots</h1>
        <p class="page-subtitle">
          Curated selections from verified sellers. All lots are open for bidding unless marked otherwise.
        </p>
      </section>

      <section class="filter-bar">
        <form id="listingsFilterForm" class="filter-group">
          <div>
            <label class="filter-label" for="categoryInput">Category</label>
            <input class="filter-input" id="categoryInput" name="tag" type="text" placeholder="All categories" />
          </div>
          <div>
            <label class="filter-label" for="searchInput">Search</label>
            <input class="filter-input" id="searchInput" name="q" type="search" placeholder="Artist, title, keyword..." />
          </div>
          <div>
            <label class="filter-label" for="sortSelect">Sort</label>
            <select class="filter-input" id="sortSelect" name="sort">
              <option value="endsAt">Ending soonest</option>
              <option value="created">Newest</option>
              <option value="title">Title (A-Z)</option>
            </select>
          </div>
          <div class="flex items-end justify-start gap-4 md:justify-end">
            <label class="sr-only" for="sortOrderSelect">Order</label>
            <select class="filter-input max-w-28" id="sortOrderSelect" name="sortOrder">
              <option value="asc">Asc</option>
              <option value="desc">Desc</option>
            </select>
            <button class="lot-link text-base" type="submit">Apply</button>
            <button id="resetFiltersBtn" class="text-sm font-medium text-[color:var(--muted)] underline-offset-4 transition hover:text-[color:var(--fg)] hover:underline" type="button">Reset</button>
            <a id="createListingCta" class="text-sm font-medium text-[color:var(--muted)] underline-offset-4 transition hover:text-[color:var(--fg)] hover:underline hidden" href="/SP2-Auction-House/create/">Sell lot</a>
          </div>
        </form>
      </section>

      <section class="space-y-5">
        <div class="flex flex-wrap items-center justify-between gap-3 border-b border-[color:var(--border-soft)] pb-4">
          <h2 class="text-xl font-semibold tracking-tight">Lots</h2>
          <p id="listingsCount" class="text-sm font-medium text-[color:var(--muted)]">0 lots</p>
        </div>
        <div id="activeFilterChips" class="flex flex-wrap gap-2"></div>
      </section>

      <section id="listingsMessage"></section>
      <section id="listingsGrid" class="lot-grid" aria-live="polite"></section>
    </main>

    <script type="module" src="/SP2-Auction-House/js/pages/listings.js"></script>
  </body>
</html>
