<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SP2 Auction House | Listing Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:opsz@9..40&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/SP2-Auction-House/dist/styles.css" />
  </head>
  <body class="app-shell">
    <header class="app-nav">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <a href="/SP2-Auction-House/listings/" class="font-serif text-4xl leading-none tracking-tight">Auction House</a>
        <button id="mobileMenuBtn" class="listings-nav-link md:hidden" type="button" aria-expanded="false" aria-controls="mobileMenu">Menu</button>
        <nav class="hidden items-center gap-8 md:flex">
          <a class="listings-nav-link is-active" href="/SP2-Auction-House/listings/">Browse</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/profile/">My Bids</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/create/">Sell</a>
          <span id="globalCredits" class="text-xs font-medium uppercase tracking-[0.12em] text-[color:var(--muted)] hidden">Credits: 0</span>
          <button id="logoutBtnDesktop" class="listings-nav-link hidden" type="button">Logout</button>
        </nav>
      </div>
      <div id="mobileMenu" class="hidden border-t border-[color:var(--border-soft)] bg-[color:var(--surface)] px-4 py-4 md:hidden">
        <div class="flex flex-col gap-3">
          <a class="listings-nav-link is-active" href="/SP2-Auction-House/listings/">Browse</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/profile/">My Bids</a>
          <a class="listings-nav-link" href="/SP2-Auction-House/create/">Sell</a>
          <span id="globalCreditsMobile" class="text-xs font-medium uppercase tracking-[0.12em] text-[color:var(--muted)] hidden">Credits: 0</span>
          <button id="logoutBtnMobile" class="listings-nav-link hidden text-left" type="button">Logout</button>
        </div>
      </div>
    </header>

    <main class="container-main space-y-8">
      <section id="listingMessage"></section>
      <section id="listingDetail" class="section-card"></section>
      <section id="ownerSection" class="section-card hidden space-y-4">
        <h2 class="font-serif text-3xl leading-none">Manage Listing</h2>
        <form id="ownerListingForm" class="grid gap-4" novalidate>
          <div>
            <label class="label" for="ownerListingTitle">Title</label>
            <input class="input" id="ownerListingTitle" name="title" type="text" required minlength="3" maxlength="80" />
          </div>
          <div>
            <label class="label" for="ownerListingDeadline">Deadline</label>
            <input class="input" id="ownerListingDeadline" name="endsAt" type="datetime-local" required />
          </div>
          <div>
            <label class="label" for="ownerListingDescription">Description</label>
            <textarea class="input min-h-20" id="ownerListingDescription" name="description" maxlength="3000"></textarea>
          </div>
          <div class="flex flex-wrap gap-3">
            <button class="btn-primary" type="submit">Update listing</button>
            <button id="deleteListingBtn" class="btn-secondary" type="button">Delete listing</button>
          </div>
        </form>
        <div id="ownerListingMessage"></div>
      </section>

      <section class="section-card space-y-4">
        <h2 class="font-serif text-3xl leading-none">Bid History</h2>
        <div id="bidHistory"></div>
      </section>

      <section id="bidSection" class="section-card hidden space-y-4">
        <h2 class="font-serif text-3xl leading-none">Place a Bid</h2>
        <form id="bidForm" class="space-y-3" novalidate>
          <div>
            <label class="label" for="bidAmount">Bid Amount</label>
            <input class="input" id="bidAmount" name="amount" type="number" min="1" step="1" required />
          </div>
          <button class="btn-primary" type="submit">Place Bid</button>
        </form>
        <div id="bidMessage"></div>
      </section>
    </main>

    <script type="module" src="/SP2-Auction-House/js/pages/listingDetail.js"></script>
  </body>
</html>
